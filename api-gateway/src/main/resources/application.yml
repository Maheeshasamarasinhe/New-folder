spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: user-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/user-service/**

        - id: subscription-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/subscription-service/**


server:
  port: 8087



eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
